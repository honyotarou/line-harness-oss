name: Deploy Worker

# Secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID (required for deploy).
# Prefer a token scoped to this Worker + D1 only (not account-wide). Rotate periodically.
# Human operators should not need production dashboard access if CI deploys; use separate CF subaccounts for prod vs dev when possible.
#
# Production surface (set via `wrangler secret put` / dashboard / vars — not committed):
# - API_KEY, ADMIN_SESSION_SECRET, LINE_*, STRIPE_WEBHOOK_SECRET, etc. — never in git.
# - DISABLE_PUBLIC_OPENAPI=1 unless you intentionally expose /openapi.json.
# - ALLOWED_HOSTNAMES for your API hostname(s); REQUIRE_CLOUDFLARE_ACCESS_JWT on workers.dev or Zero Trust.
# - Optional WAF/Bot: enable Cloudflare Bot Management on the zone, then MIN_CF_BOT_SCORE (e.g. 30) on the Worker.
# - Multi LINE accounts on one Worker: MULTI_LINE_ACCOUNT_QUERY_REQUIRES_LINE_ACCOUNT_ID=1
# - REQUIRE_ADMIN_SESSION_SECRET=1 + ADMIN_SESSION_SECRET (wrangler secret) so sessions are not signed with API_KEY
# - BROADCAST_SEND_SECRET + X-Broadcast-Send-Secret header for /api/broadcasts/:id/send (second factor for mass send)
#
# After schema changes (e.g. admin_principal_roles), run D1 migrations against remote before relying on new features.

# Configure CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID secrets to enable auto-deploy
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/worker/**'
      - 'packages/db/**'
      - 'packages/shared/**'
      - 'packages/line-sdk/**'
      - '.github/workflows/deploy-worker.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @line-crm/shared --filter @line-crm/line-sdk --filter @line-crm/db build

      - name: Inject D1 database id (optional; when wrangler.toml uses YOUR_D1_DATABASE_ID)
        working-directory: apps/worker
        env:
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
        run: |
          if [ -n "$D1_DATABASE_ID" ]; then
            sed -i.bak "s|YOUR_D1_DATABASE_ID|$D1_DATABASE_ID|g" wrangler.toml && rm -f wrangler.toml.bak
          fi

      # Without this, deploy overwrites Worker vars with wrangler.toml placeholders and breaks CORS.
      - name: Inject WORKER_URL / WEB_URL / LIFF_URL (optional; GitHub Secrets)
        working-directory: apps/worker
        env:
          INJECT_WORKER_URL: ${{ secrets.WORKER_URL }}
          INJECT_WEB_URL: ${{ secrets.WEB_URL }}
          INJECT_LIFF_URL: ${{ secrets.LIFF_URL }}
        run: |
          if [ -n "$INJECT_WORKER_URL" ]; then
            sed -i.bak "s|https://YOUR_SUBDOMAIN.workers.dev|$INJECT_WORKER_URL|g" wrangler.toml && rm -f wrangler.toml.bak
          fi
          if [ -n "$INJECT_WEB_URL" ]; then
            sed -i.bak "s|https://YOUR_PROJECT.vercel.app|$INJECT_WEB_URL|g" wrangler.toml && rm -f wrangler.toml.bak
          fi
          if [ -n "$INJECT_LIFF_URL" ]; then
            sed -i.bak "s|https://liff.line.me/YOUR_LIFF_ID|$INJECT_LIFF_URL|g" wrangler.toml && rm -f wrangler.toml.bak
          fi

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/worker
          command: deploy
