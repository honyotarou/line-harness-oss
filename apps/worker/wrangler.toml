name = "line-crm-worker"
main = "src/index.ts"
compatibility_date = "2024-12-01"
workers_dev = true

# API_KEY is set via `wrangler secret put API_KEY`
# Do NOT hardcode secrets here
#
# Caution: every `wrangler deploy` uploads [vars] below. Placeholders overwrite
# dashboard edits unless you use wrangler.local.toml (local) or CI injects URLs
# (see .github/workflows/deploy-worker.yml + GitHub Secrets WORKER_URL / WEB_URL).

[vars]
# Replace with your deployed URLs (or override in wrangler.local.toml, gitignored).
WORKER_URL = "https://YOUR_SUBDOMAIN.workers.dev"
WEB_URL = "https://YOUR_PROJECT.vercel.app"
# Required for /auth/line (friend-add flow). Keep as placeholder in repo defaults.
LIFF_URL = "https://liff.line.me/YOUR_LIFF_ID"
# ALLOWED_ORIGINS = "https://admin.example.com,https://preview.example.com"
#
# Cloudflare Zero Trust / Access (optional): require Cf-Access-Jwt-Assertion on protected routes
# REQUIRE_CLOUDFLARE_ACCESS_JWT = "1"
# CLOUDFLARE_ACCESS_TEAM_DOMAIN = "yourteam.cloudflareaccess.com"
# CLOUDFLARE_ACCESS_ALLOWED_EMAILS = "you@company.com,coworker@company.com"

# D1 の実 database_id をコミットしたくない場合は wrangler.local.toml を使う（例: wrangler.local.toml.example をコピー）。
[[d1_databases]]
binding = "DB"
database_name = "line-crm"
database_id = "YOUR_D1_DATABASE_ID"

[triggers]
crons = ["*/5 * * * *"]
