name = "line-crm-worker"
main = "src/index.ts"
compatibility_date = "2024-12-01"
workers_dev = true

# API_KEY is set via `wrangler secret put API_KEY`
# Do NOT hardcode secrets here

[vars]
# Replace with your deployed URLs (or override in wrangler.local.toml, gitignored).
WORKER_URL = "https://YOUR_SUBDOMAIN.workers.dev"
WEB_URL = "https://YOUR_PROJECT.vercel.app"
# ALLOWED_ORIGINS = "https://admin.example.com,https://preview.example.com"

# D1 の実 database_id をコミットしたくない場合は wrangler.local.toml を使う（例: wrangler.local.toml.example をコピー）。
[[d1_databases]]
binding = "DB"
database_name = "line-crm"
database_id = "YOUR_D1_DATABASE_ID"

[triggers]
crons = ["*/5 * * * *"]
