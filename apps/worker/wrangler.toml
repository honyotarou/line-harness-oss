name = "line-crm-worker"
main = "src/index.ts"
compatibility_date = "2024-12-01"
workers_dev = true

# API_KEY is set via `wrangler secret put API_KEY`
# Do NOT hardcode secrets here
#
# Caution: every `wrangler deploy` uploads [vars] below. Placeholders overwrite
# dashboard edits unless you use wrangler.local.toml (local) or CI injects URLs
# (see .github/workflows/deploy-worker.yml + GitHub Secrets WORKER_URL / WEB_URL).

[vars]
# Replace with your deployed URLs (or override in wrangler.local.toml, gitignored).
WORKER_URL = "https://YOUR_SUBDOMAIN.workers.dev"
WEB_URL = "https://YOUR_PROJECT.vercel.app"
# Required for /auth/line (friend-add flow). Keep as placeholder in repo defaults.
LIFF_URL = "https://liff.line.me/YOUR_LIFF_ID"
# ALLOWED_ORIGINS = "https://admin.example.com,https://preview.example.com"
#
# Cloudflare Zero Trust / Access (optional): require Cf-Access-Jwt-Assertion on protected routes
# REQUIRE_CLOUDFLARE_ACCESS_JWT = "1"
# CLOUDFLARE_ACCESS_TEAM_DOMAIN = "yourteam.cloudflareaccess.com"
# CLOUDFLARE_ACCESS_ALLOWED_EMAILS = "you@company.com,coworker@company.com"
# CLOUDFLARE_ACCESS_AUDIENCE = "<Access application audience UUID or tag from JWT aud claim>"
#
# Optional: HMAC secret for admin session cookies (defaults to API_KEY if unset)
# ADMIN_SESSION_SECRET = "use wrangler secret put ADMIN_SESSION_SECRET in production"
#
# Optional: Host header allowlist (comma-separated). When set, requests with other Host values get 403.
# Example: ALLOWED_HOSTNAMES = "your-subdomain.workers.dev,api.yourdomain.com"
#
# Public OpenAPI (/openapi.json): off by default. Set ENABLE_PUBLIC_OPENAPI = "1" to expose; production hardening:
# DISABLE_PUBLIC_OPENAPI = "1"   (always wins — forces off)
#
# Cloudflare Bot Management (optional; reduces scripted login / affiliate-click abuse):
# MIN_CF_BOT_SCORE = "30"
# REQUIRE_CF_BOT_SIGNAL = "1"   (403 if cf.botManagement.score is missing on protected POSTs; dev/local usually off)
#
# Multi-account on one Worker: force explicit lineAccountId on list APIs (friends, broadcasts, line-accounts, …)
# MULTI_LINE_ACCOUNT_QUERY_REQUIRES_LINE_ACCOUNT_ID = "1"
#
# REQUIRE_ADMIN_SESSION_SECRET = "1"   plus wrangler secret put ADMIN_SESSION_SECRET — sessions must not use API_KEY as HMAC
# Non-local HTTPS WORKER_URL also refuses API_KEY-backed session signing unless ADMIN_SESSION_SECRET is set (or transitional ALLOW_LEGACY_API_KEY_SESSION_SIGNER=1).
# BROADCAST_SEND_SECRET = "<long random>"   plus header X-Broadcast-Send-Secret on mass send endpoints
#
# Legacy only: allow Bearer raw API_KEY on GET /api/auth/session (default: off)
# ALLOW_LEGACY_API_KEY_BEARER_SESSION = "1"
#
# Read-only staff (RBAC): when REQUIRE_CLOUDFLARE_ACCESS_JWT is on, insert rows into D1 table
# admin_principal_roles (email, role) with role='viewer' to block POST/PUT/PATCH/DELETE except
# /api/auth/login and /api/auth/logout. No row for an email = full admin (default) unless:
# REQUIRE_ADMIN_PRINCIPAL_ALLOWLIST = "1"
#   → only emails with a row may use the API; empty table → only /api/admin/principal-roles until you add a row.
# Apply schema: packages/db/schema.sql, or incremental pnpm db:apply-011:remote (migrations/011_admin_principal_roles.sql).
#
# Cloudflare / D1 ops (not enforced by code): use least-privilege API tokens; separate prod account
# or restrict dashboard access; deploy via CI only; enable audit logs in Zero Trust.

# 実 database_id は wrangler.local.toml に置く（gitignore）。Wrangler 3 は自動マージしないため、
# `pnpm dev` / `deploy` と `pnpm db:apply-*` / d1 系スクリプトは `-c wrangler.local.toml` を付与する。
[[d1_databases]]
binding = "DB"
database_name = "line-crm"
database_id = "YOUR_D1_DATABASE_ID"

[triggers]
crons = ["*/5 * * * *"]
